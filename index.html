<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Österreichische Gesundheitskasse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background-color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
        }
        
        .logo svg {
            width: 100%;
            height: 100%;
        }
        
        .main-title {
            font-size: 32px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 20px;
            line-height: 1.3;
            letter-spacing: normal;
        }
        
        .address {
            font-size: 16px;
            font-weight: 400;
            color: #222222;
            line-height: 1.6;
        }
        
        .address .separator {
            margin: 0 8px;
        }
        
        /* Responsive adjustments */
        @media (max-width: 600px) {
            .main-title {
                font-size: 24px;
            }
            
            .address {
                font-size: 14px;
            }
            
            .logo {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Green circular logo with gap (open circle) -->
        <div class="logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Open circle: 300 degree arc (missing ~60 degrees at top-right) -->
                <circle 
                    cx="50" 
                    cy="50" 
                    r="42" 
                    fill="none" 
                    stroke="#00C853" 
                    stroke-width="12"
                    stroke-dasharray="220 264"
                    stroke-dashoffset="66"
                    transform="rotate(-30 50 50)"
                />
            </svg>
        </div>
        
        <!-- Main title -->
        <h1 class="main-title">Österreichische Gesundheitskasse</h1>
        
        <!-- Address line -->
        <p class="address">
            Gruberstraße 77<span class="separator">·</span>Postfach 61<span class="separator">·</span>4021 Linz
        </p>
    </div>
</body>
</html>
